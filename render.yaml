services:
  - type: web
    name: skill-observation-api
    runtime: python
    rootDir: Skill Observation Checklist App/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set this manually in Render dashboard
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Vercel frontend URL
